<!doctype html>
<html lang="en">

<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
	<title>Foundation Registration Portal</title>
	<link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0/css/bootstrap.min.css">
	<link href="https://fonts.googleapis.com/css?family=Montserrat:300,400,600,700" rel="stylesheet">
	<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.css" rel="stylesheet">
	<script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>

	<style>
		body {
			background: #f8f9fa;
			font-family: 'Montserrat', sans-serif;
			padding-top: 50px;
		}

		.form-box {
			background: #fff;
			padding: 40px;
			border-radius: 12px;
			box-shadow: 0 4px 20px rgba(0,0,0,0.08);
		}

		.qr-wrapper {
			background: #fff;
			padding: 30px;
			border-radius: 12px;
			box-shadow: 0 4px 15px rgba(0,0,0,0.1);
			display: inline-block;
			width: 100%;
		}

		.btn-success:disabled {
			opacity: 0.6;
			cursor: not-allowed;
		}

		.loading-spinner {
			display: inline-block;
			width: 20px;
			height: 20px;
			border: 3px solid #f3f3f3;
			border-top: 3px solid #28a745;
			border-radius: 50%;
			animation: spin 1s linear infinite;
			margin-right: 10px;
		}

		@keyframes spin {
			0% {
				transform: rotate(0deg);
			}

			100% {
				transform: rotate(360deg);
			}
		}
	</style>
</head>

<body>
	<div class="container my-5">
		<div class="text-center mb-4">
			<a href="index.html" class="btn btn-outline-secondary btn-sm mb-3"><i class="fa fa-arrow-left"></i> Back to Home</a>
			<h2 class="font-weight-bold text-dark">Foundation Membership Generation</h2>
			<p class="text-muted">Register to create your dynamic entry credential record mapping to cloud systems</p>
		</div>

		<div class="row justify-content-center">
			<div class="col-lg-6 col-md-8 mb-4">
				<div class="form-box">
					<h4 class="mb-4 font-weight-bold text-success"><i class="fa fa-user-plus"></i> Personal Particulars</h4>

					<div id="statusMessage" style="display:none;" class="alert mb-3"></div>

					<form id="registrationForm" onsubmit="handleRegistration(event)">
						<div class="form-group">
							<label>Full Name <span class="text-danger">*</span></label>
							<input type="text" id="regName" class="form-control" placeholder="Enter full name" required />
						</div>
						<div class="form-group">
							<label>Mobile Number <span class="text-danger">*</span></label>
							<input type="tel" id="regMobile" class="form-control" placeholder="10 digit mobile number" required pattern="[0-9]{10}" />
						</div>
						<div class="form-group">
							<label>Age <span class="text-danger">*</span></label>
							<input type="number" id="regAge" class="form-control" placeholder="Your age" required min="1" max="120" />
						</div>
						<div class="form-group">
							<label>State <span class="text-danger">*</span></label>
							<input type="text" id="regState" class="form-control" placeholder="Your state" required />
						</div>
						<div class="form-group">
							<label>District <span class="text-danger">*</span></label>
							<input type="text" id="regDistrict" class="form-control" placeholder="Your district" required />
						</div>

						<button type="submit" class="btn btn-success btn-block btn-lg" id="registerBtn">
							<i class="fa fa-id-card"></i> Generate Unique Membership Card
						</button>
					</form>
				</div>
			</div>

			<div class="col-lg-5 col-md-8 text-center">
				<div id="qrOutputWrapper" style="display:none;">
					<div class="qr-wrapper">
						<h4 id="generatedMemberName" class="text-dark font-weight-bold mb-2"></h4>
						<p id="generatedMemberId" class="text-success font-weight-bold h5 mb-3"></p>
						<div id="qrcode" class="d-flex justify-content-center mb-4"></div>

						<a id="whatsappBtn" href="#" target="_blank" class="btn btn-outline-success btn-block">
							<i class="fa fa-whatsapp"></i> Submit to Bot Verification
						</a>
						<!-- வாட்ஸ்அப் பட்டனுக்கு கீழே இதை போடு மச்சி -->
						<a id="whatsappBtn" href="#" target="_blank" class="btn btn-outline-success btn-block">
							<i class="fa fa-whatsapp"></i> Submit to Bot Verification
						</a>

						<!-- புதிய டவுன்லோட் பட்டன் -->
						<button id="downloadBtn" class="btn btn-success btn-block mt-2" onclick="downloadQR()">
							<i class="fa fa-download"></i> Download QR Code
						</button>

						<button class="btn btn-outline-secondary btn-block mt-2" onclick="resetForm()">
							<i class="fa fa-refresh"></i> Register Another Member
						</button>
						<button class="btn btn-outline-secondary btn-block mt-2" onclick="resetForm()">
							<i class="fa fa-refresh"></i> Register Another Member
						</button>
					</div>
				</div>
			</div>
		</div>
	</div>



	<script>
		// ========================================================
		// ⚠️ இங்க உன்னோட REAL GOOGLE APPS SCRIPT URL-ஐ இங்க போடு மச்சி
		// ========================================================
		const GOOGLE_APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxZqtk1nIy55bi73JAxBksEhbcnhy5IUhn2eLJL09k7RGrYK2VDFTzCHozeegdE1HE/exec";

		let isProcessing = false;

		function handleRegistration(event) {
			event.preventDefault();

			if (isProcessing) {
				showStatus('⚠️ Please wait...', 'warning');
				return;
			}

			const name = document.getElementById("regName").value.trim();
			const mobile = document.getElementById("regMobile").value.trim();
			const age = document.getElementById("regAge").value.trim();
			const state = document.getElementById("regState").value.trim();
			const district = document.getElementById("regDistrict").value.trim();

			if (!name || !mobile || !age || !state || !district) {
				showStatus('⚠️ Please fill all fields', 'danger');
				return;
			}

			if (mobile.length !== 10 || !/^[0-9]{10}$/.test(mobile)) {
				showStatus('⚠️ Enter valid 10-digit mobile number', 'danger');
				return;
			}

			isProcessing = true;
			const btn = document.getElementById("registerBtn");
			btn.disabled = true;
			btn.innerHTML = '<span class="loading-spinner"></span> Checking Duplicates...';
			showStatus('⏳ Checking mobile number availability...', 'info');

			// 🔥 முதலிலேயே மொபைல் நம்பர் ஏற்கனவே இருக்கானு GET API மூலமா செக் பண்றோம் மச்சி
			fetch(`${GOOGLE_APPS_SCRIPT_URL}?action=getMembers`)
				.then(res => res.json())
				.then(members => {
					const isMobileDuplicate = members.some(m => m.mobile === mobile);

					if (isMobileDuplicate) {
						showStatus('❌ This Mobile Number is already registered!', 'danger');
						document.getElementById("qrOutputWrapper").style.display = "none"; // QR-ஐ மறைச்சிடுவோம்
						btn.disabled = false;
						btn.innerHTML = '<i class="fa fa-id-card"></i> Generate Unique Membership Card';
						isProcessing = false;
						return; // ரெஜிஸ்ட்ரேஷனை இதோட நிறுத்திடுறோம்
					}

					// டூப்ளிகேட் இல்லைனா, ரெஜிஸ்டர் பண்ற ப்ராசஸ் தொடரும்
					const memberId = "MEMBER-" + Math.floor(100000 + Math.random() * 900000);
					generateQR(name, memberId, mobile);

					btn.innerHTML = '<span class="loading-spinner"></span> Saving to Cloud...';
					showStatus('⏳ Saving data to Google Sheet...', 'info');

					const formData = new URLSearchParams();
					formData.append('action', 'registerMember');
					formData.append('memberId', memberId);
					formData.append('name', name);
					formData.append('mobile', mobile);
					formData.append('age', age);
					formData.append('state', state);
					formData.append('district', district);

					return fetch(GOOGLE_APPS_SCRIPT_URL, {
						method: "POST",
						mode: "no-cors",
						headers: { "Content-Type": "application/x-www-form-urlencoded" },
						body: formData.toString()
					});
				})
				.then(response => {
					if (response) { // ஃபெட்ச் நடந்திருந்தால் மட்டும்
						showStatus('✅ Registration successful and saved to cloud!', 'success');
						document.getElementById("registrationForm").reset();
					}
				})
				.catch(err => {
					console.error('Error:', err);
					if (isProcessing) {
						showStatus('⚠️ Sheet sync issue, but card is generated below!', 'warning');
					}
				})
				.finally(() => {
					btn.disabled = false;
					btn.innerHTML = '<i class="fa fa-id-card"></i> Generate Unique Membership Card';
					isProcessing = false;
				});
		}

		function generateQR(name, memberId, mobile) {
			document.getElementById("qrOutputWrapper").style.display = "block";
			document.getElementById("generatedMemberName").innerText = name;
			document.getElementById("generatedMemberId").innerText = memberId;
			document.getElementById("qrcode").innerHTML = "";

			try {
				new QRCode(document.getElementById("qrcode"), {
					text: memberId,
					width: 200,
					height: 200,
					colorDark: "#000000",
					colorLight: "#ffffff",
					correctLevel: QRCode.CorrectLevel.H
				});
			} catch (e) {
				console.error("QR Error:", e);
			}

			const msg = encodeURIComponent(
				`Hello Admin,\n\n` +
				`📛 Name: ${name}\n` +
				`📱 Mobile: ${mobile}\n` +
				`🆔 Member ID: ${memberId}\n\n` +
				`Please verify and activate.`
			);
			document.getElementById("whatsappBtn").href = `https://wa.me/916380419470?text=${msg}`;
			document.getElementById("qrOutputWrapper").scrollIntoView({ behavior: 'smooth' });
		}

		function showStatus(message, type) {
			const div = document.getElementById("statusMessage");
			div.style.display = "block";
			div.className = "alert mb-3";

			const types = {
				'success': 'alert-success',
				'danger': 'alert-danger',
				'warning': 'alert-warning',
				'info': 'alert-info'
			};
			div.className += ' ' + (types[type] || 'alert-info');
			div.innerHTML = message;
		}

		function resetForm() {
			document.getElementById("qrOutputWrapper").style.display = "none";
			document.getElementById("qrcode").innerHTML = "";
			document.getElementById("registrationForm").reset();

			const btn = document.getElementById("registerBtn");
			btn.disabled = false;
			btn.innerHTML = '<i class="fa fa-id-card"></i> Generate Unique Membership Card';
			isProcessing = false;

			document.getElementById("statusMessage").style.display = "none";
			window.scrollTo({ top: 0, behavior: 'smooth' });
		}
	</script>



	<script>

		function downloadQR() {
			// QR கோடு ஜெனரேட் ஆன பிறகு இருக்கும் <canvas> அல்லது <img> டேகை எடுக்கிறோம்
			const qrContainer = document.getElementById("qrcode");
			const canvas = qrContainer.querySelector("canvas");
			const img = qrContainer.querySelector("img");

			let imageSrc = "";

			if (canvas) {
				// Canvas-ஆக இருந்தால் அதை Base64 Image டேட்டாவாக மாற்றும்
				imageSrc = canvas.toDataURL("image/png");
			} else if (img && img.src) {
				// ஒருவேளை அது நேரடியாக Image டேகாக இருந்தால் அதன் சோர்ஸை எடுக்கும்
				imageSrc = img.src;
			} else {
				alert("⚠️ QR Code still generating or not found!");
				return;
			}

			const memberName = document.getElementById("generatedMemberName").innerText || "Member";
			const memberId = document.getElementById("generatedMemberId").innerText || "QR";

			// தற்காலிகமாக ஒரு லிங்க் உருவாக்கி டவுன்லோட் செய்ய வைக்கிறோம்
			const downloadLink = document.createElement("a");
			downloadLink.href = imageSrc;
			downloadLink.download = `${memberName}_${memberId}.png`; // ஃபைல் நேம் செட் பண்றோம்
			document.body.appendChild(downloadLink);
			downloadLink.click();
			document.body.removeChild(downloadLink);
		}



	</script>


</body>

</html>
